<!DOCTYPE html>
<html lang="zh">
<head>

    <style>
        /* 全局基础设置 */
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        /* 核心布局：左右分栏 */
        .container1 {
            max-width: 1200px;
            margin: 0 auto;
            display: flex; /* 开启 Flexbox 左右布局 */
            gap: 20px;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            min-height: 600px; /* 保证右侧内容较少时也能撑起高度 */
        }

        /* 左侧：产品导航菜单 */
        .sidebar {
            flex: 0 0 260px; /* 左侧固定宽度 250px */
            border-right: 2px solid #f0f2f5;
            padding-right: 20px;
        }
        .sidebar-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #1a1a1a;
            padding-bottom: 10px;
            border-bottom: 2px solid #007bff;
        }
        .product-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .product-list li {
            margin-bottom: 10px;
        }
        .product-list a {
            display: block;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            text-decoration: none;
            color: #495057;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .product-list a:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        /* 被选中的产品样式 */
        .product-list a.active {
            background: #e7f1ff;
            color: #007bff;
            border-color: #b8daff;
            font-weight: bold;
        }

        /* 右侧：产品详情展示区 */
        .content-area {
            flex: 1; /* 占据剩余全部宽度 */
            padding-left: 10px;
        }
        
        /* 默认隐藏所有的产品面板 */
        .product-panel {
            display: none;
            animation: fadeIn 0.4s ease; /* 简单的淡入动画 */
        }
        /* 只有带有 active 类的面板才会显示 */
        .product-panel.active {
            display: block;
        }

        

        .product-panel h4 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 1.2em;
            margin-bottom: 3px;
        }

        /* 媒体网格：图片和视频混合排版 */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); /* 自动响应式网格 */
            gap: 20px;
        }
        
        /* 图片和视频的统一外观 */
        .media-item {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            object-fit: cover; /* 保证图片不变形 */
        }
        img.media-item {
            aspect-ratio: 4 / 3; /* 图片固定比例 */
        }
        video.media-item {
            aspect-ratio: 16 / 9; /* 视频固定比例 */
            background: #000;
        }

        /* 淡入动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 手机端适配：改为上下布局 */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { flex: none; width: 100%; border-right: none; border-bottom: 2px solid #f0f2f5; padding-right: 0; padding-bottom: 20px; margin-bottom: 20px; }
        }
    </style>
</head>

<script>
    function switchProduct(panelId, clickedLink) {
        // 1. 暂停所有正在播放的视频 (非常关键的体验优化)
        var allVideos = document.querySelectorAll('video');
        allVideos.forEach(function(video) {
            video.pause(); 
        });

        // 2. 隐藏右侧所有的产品面板
        var allPanels = document.querySelectorAll('.product-panel');
        allPanels.forEach(function(panel) {
            panel.classList.remove('active');
        });

        // 3. 只显示当前点击的那个面板
        document.getElementById(panelId).classList.add('active');

        // 4. 更新左侧菜单的蓝色高亮状态
        var allLinks = document.querySelectorAll('.product-list a');
        allLinks.forEach(function(link) {
            link.classList.remove('active');
        });
        clickedLink.classList.add('active');
    }
</script>
